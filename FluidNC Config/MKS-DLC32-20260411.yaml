board: MKS-DLC32 V2.1
name: MKS DLC32 Test Controller
meta: (27.11.2023) by dJOS
kinematics: {}
stepping:
  engine: I2S_STATIC
  idle_ms: 255
  pulse_us: 10
  dir_delay_us: 1
  disable_delay_us: 0
axes:
  shared_stepper_disable_pin: i2so.0
  x:
    steps_per_mm: 50
    max_rate_mm_per_min: 10000
    acceleration_mm_per_sec2: 5000
    max_travel_mm: 27
    soft_limits: true
    motor0:
      limit_neg_pin: gpio.36:low
      limit_pos_pin: NO_PIN
      hard_limits: true
      pulloff_mm: 1
      stepstick:
        step_pin: i2so.1
        direction_pin: i2so.2:low
        disable_pin: NO_PIN
        ms1_pin: NO_PIN
        ms2_pin: NO_PIN
        ms3_pin: NO_PIN
      limit_all_pin: NO_PIN
    homing:
      cycle: 2
      positive_direction: false
  y:
    steps_per_mm: 50
    max_rate_mm_per_min: 10000
    acceleration_mm_per_sec2: 5000
    max_travel_mm: 27
    soft_limits: true
    motor0:
      limit_neg_pin: gpio.35:low
      hard_limits: true
      pulloff_mm: 1
      stepstick:
        step_pin: i2so.5
        direction_pin: i2so.6:low
        disable_pin: NO_PIN
        ms1_pin: NO_PIN
        ms2_pin: NO_PIN
        ms3_pin: NO_PIN
      limit_pos_pin: NO_PIN
      limit_all_pin: NO_PIN
    homing:
      cycle: 3
      positive_direction: false
  z:
    steps_per_mm: 50
    max_rate_mm_per_min: 10000
    acceleration_mm_per_sec2: 5000
    max_travel_mm: 27
    soft_limits: true
    motor0:
      limit_neg_pin: gpio.34:low
      hard_limits: true
      pulloff_mm: 1
      stepstick:
        step_pin: i2so.3
        direction_pin: i2so.4:low
        disable_pin: NO_PIN
        ms1_pin: NO_PIN
        ms2_pin: NO_PIN
        ms3_pin: NO_PIN
      limit_pos_pin: NO_PIN
      limit_all_pin: NO_PIN
    homing:
      cycle: 1
      positive_direction: false
  homing_runs: 2
i2so:
  bck_pin: gpio.16
  data_pin: gpio.21
  ws_pin: gpio.17
control:
  safety_door_pin: NO_PIN
  reset_pin: NO_PIN
  feed_hold_pin: NO_PIN
  cycle_start_pin: NO_PIN
  macro0_pin: NO_PIN
  macro1_pin: NO_PIN
  macro2_pin: NO_PIN
  macro3_pin: NO_PIN
  fault_pin: NO_PIN
  estop_pin: NO_PIN
macros: {}
coolant:
  flood_pin: NO_PIN
  mist_pin: NO_PIN
  delay_ms: 0
start:
  must_home: true
  deactivate_parking: false
  check_limits: false
user_outputs:
  analog0_pin: NO_PIN
  analog1_pin: NO_PIN
  analog2_pin: NO_PIN
  analog3_pin: NO_PIN
  analog0_hz: 5000
  analog1_hz: 5000
  analog2_hz: 5000
  analog3_hz: 5000
  digital0_pin: NO_PIN
  digital1_pin: NO_PIN
  digital2_pin: NO_PIN
  digital3_pin: NO_PIN
arc_tolerance_mm: 0.002
junction_deviation_mm: 0.01
verbose_errors: false
report_inches: false
enable_parking_override_control: false
use_line_numbers: false
PWM:
  pwm_hz: 1000
  direction_pin: NO_PIN
  output_pin: gpio.32
  enable_pin: gpio.27
  disable_with_s0: false
  s0_with_disable: true
  spinup_ms: 0
  spindown_ms: 0
  tool_num: 0
  speed_map: 0=0.000% 10000=1.000% 30000=100.000%
i2c0:
  sda_pin: gpio.00
  scl_pin: gpio.04
oled:
  i2c_num: 0
  i2c_address: 60
  width: 128
  height: 64
  radio_delay_ms: 1000
uart2:
  txd_pin: gpio.25
  rxd_pin: gpio.33
  rts_pin: NO_PIN
  cts_pin: NO_PIN
  baud: 1000000
  mode: 8N1
uart_channel2:
  report_interval_ms: 75
  uart_num: 2
